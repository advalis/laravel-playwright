services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.4}
    restart: always
    tty: true
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    networks:
      - laravel-playwright

  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
        - laravel-playwright

networks:
    laravel-playwright:
        name: laravel-playwright
        driver: bridge